{% extends "base.html" %}
{% block content %}

<div class="container mt-5" style="max-width:420px;">
  <div class="card shadow p-4">
    <h4 class="mb-3 text-center">Set New Password</h4>

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control" required>
      </div>

      <div class="mb-2">
        <div class="progress" style="height:6px;">
          <div id="strengthBar" class="progress-bar" style="width:0%"></div>
        </div>
        <small id="strengthText" class="text-muted"></small>
      </div>


      <ul class="small">
        <li id="rule-length" class="text-danger">❌ At least 8 characters</li>
        <li id="rule-upper" class="text-danger">❌ 1 uppercase letter</li>
        <li id="rule-number" class="text-danger">❌ 1 number</li>
        <li id="rule-special" class="text-danger">❌ 1 special symbol</li>
      </ul>

      <button class="btn btn-success w-100">Save Password</button>
    </form>
  </div>
</div>


<script>
const pwd = document.querySelector("input[name='password']");
const confirmPwd = document.querySelector("input[name='confirm_password']");
const strengthBar = document.getElementById("strengthBar");
const strengthText = document.getElementById("strengthText");

const rLength = document.getElementById("rule-length");
const rUpper = document.getElementById("rule-upper");
const rNumber = document.getElementById("rule-number");
const rSpecial = document.getElementById("rule-special");

pwd.addEventListener("input", () => {
  const v = pwd.value;
  let score = 0;

  if (v.length >= 8) {
    rLength.className = "text-success";
    rLength.innerHTML = "✅ At least 8 characters";
    score++;
  } else {
    rLength.className = "text-danger";
    rLength.innerHTML = "❌ At least 8 characters";
  }


  if (/[A-Z]/.test(v)) {
    rUpper.className = "text-success";
    rUpper.innerHTML = "✅ 1 uppercase letter";
    score++;
  } else {
    rUpper.className = "text-danger";
    rUpper.innerHTML = "❌ 1 uppercase letter";
  }

 
  if (/[0-9]/.test(v)) {
    rNumber.className = "text-success";
    rNumber.innerHTML = "✅ 1 number";
    score++;
  } else {
    rNumber.className = "text-danger";
    rNumber.innerHTML = "❌ 1 number";
  }

 
  if (/[@$!%*?&#]/.test(v)) {
    rSpecial.className = "text-success";
    rSpecial.innerHTML = "✅ 1 special symbol";
    score++;
  } else {
    rSpecial.className = "text-danger";
    rSpecial.innerHTML = "❌ 1 special symbol";
  }


  let percent = (score / 4) * 100;
  strengthBar.style.width = percent + "%";

  if (score === 0) {
    strengthText.innerText = "";
    strengthBar.className = "progress-bar";
  } 
  else if (score <= 2) {
    strengthText.innerText = "Weak Password";
    strengthBar.className = "progress-bar bg-danger";
  } 
  else if (score === 3) {
    strengthText.innerText = "Medium Strength";
    strengthBar.className = "progress-bar bg-warning";
  } 
  else {
    strengthText.innerText = "Strong Password";
    strengthBar.className = "progress-bar bg-success";
  }
});
</script>

{% endblock %}
