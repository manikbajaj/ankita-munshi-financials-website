{% extends "admin/dashboard.html" %}
{% block content %}
<div class="container mt-3">
  <h4>Shared PDFs</h4>
  <form method="post" enctype="multipart/form-data" class="mb-3">
    <div class="mb-2"><input class="form-control" name="name" placeholder="Title"></div>
    <div class="mb-2"><input class="form-control" type="file" name="pdf" accept="application/pdf"></div>
    <button class="btn btn-primary">Upload</button>
  </form>
  <table class="table">
    <tr><th>Title</th><th>URL</th><th>Uploaded At</th></tr>
    {% for p in pdfs %}
    <tr><td>{{ p.name }}</td><td><a href="{{ p.url }}" target="_blank">Open</a></td><td>{{ p.uploaded_at }}</td></tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
