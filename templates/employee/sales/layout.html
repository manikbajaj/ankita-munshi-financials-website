{% extends "base.html" %}
{% block content %}

<div class="d-flex">

{% include "employee/sales/sidebar.html" %}

<div class="flex-fill p-4">
{% block sales_content %}{% endblock %}
</div>

</div>

<!-- ADD PARTNER MODAL -->

<div class="modal fade" id="addPartnerModal" tabindex="-1">
<div class="modal-dialog modal-lg">
<div class="modal-content">

<form method="POST" action="{{ url_for('employee_sales.sales_add_partner') }}">

<div class="modal-header">
<h5>Add Partner</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body row g-2">

<div class="col-md-6"><input name="name" class="form-control" placeholder="Partner Name" required></div>
<div class="col-md-6"><input name="phone" class="form-control" placeholder="Phone"></div>
<div class="col-md-6"><input name="email" class="form-control" placeholder="Email"></div>
<div class="col-md-6"><input name="gst_number" class="form-control" placeholder="GST Number"></div>
<div class="col-md-6"><input name="profession_manual" class="form-control" placeholder="Profession"></div>
<div class="col-md-6"><input name="city" class="form-control" placeholder="City"></div>
<div class="col-md-6"><input name="state" class="form-control" placeholder="State"></div>

<div class="col-12">
<textarea name="address" class="form-control" placeholder="Address"></textarea>
</div>

<!-- CLIENT FORTE PILLS -->

<div class="col-12 mt-2">
<label>Client Forte</label>

<div class="forte-box">
{% for f in fortes %}
<label class="forte-pill">
<input type="checkbox" name="fortes[]" value="{{ f }}">
<span>{{ f }}</span>
</label>
{% endfor %}
</div>

</div>

</div>

<div class="modal-footer">
<button class="btn btn-primary">Create Partner</button>
</div>

</form>

</div>
</div>
</div>

<style>
.forte-box{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:6px;
}

.forte-pill input{display:none}

.forte-pill span{
padding:6px 14px;
border-radius:16px;
background:#f1f3f5;
font-size:13px;
cursor:pointer;
transition:.2s;
}

.forte-pill input:checked + span{
background:#4f46e5;
color:white;
}

.forte-pill:nth-child(1) span{background:#e3f2fd}
.forte-pill:nth-child(2) span{background:#e8f5e9}
.forte-pill:nth-child(3) span{background:#fff3e0}
.forte-pill:nth-child(4) span{background:#fce4ec}
.forte-pill:nth-child(5) span{background:#ede7f6}
.forte-pill:nth-child(6) span{background:#e0f2f1}
</style>

{% endblock %}
